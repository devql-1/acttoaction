<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rajasthan Filings | Coming Soon</title>
  <link
      rel="icon"
      href="favicon.png"
      type="image/x-icon"
    />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      text-align: center;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: #fff;
      letter-spacing: 1px;
      background: white;
      padding: 10px;
      border-radius: 20px;
    }

    .tagline {
      font-size: 1.1rem;
      color: #e0e0e0;
      margin-bottom: 40px;
    }

    .countdown {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
    }

    .countdown div {
      background: rgba(255, 255, 255, 0.1);
      padding: 20px 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }

    .countdown span {
      display: block;
      font-size: 2rem;
      font-weight: bold;
    }

    .countdown small {
      font-size: 0.9rem;
      color: #ddd;
    }

    .footer {
      font-size: 0.9rem;
      color: #ccc;
      position: absolute;
      bottom: 20px;
    }

    @media (max-width: 600px) {
      .countdown {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <div class="logo"><img src="rj-filings-logo.png" alt="img" width="150px"></div>
  <div class="tagline">We’re launching something amazing soon!</div>

  <div class="countdown">
    <div>
      <span id="days">00</span>
      <small>Days</small>
    </div>
    <div>
      <span id="hours">00</span>
      <small>Hours</small>
    </div>
    <div>
      <span id="minutes">00</span>
      <small>Minutes</small>
    </div>
    <div>
      <span id="seconds">00</span>
      <small>Seconds</small>
    </div>
  </div>

  <div class="footer">© <span id="year"></span> Rajasthan Filings. All rights reserved.</div>

<script>
  // Countdown Timer (set to today at 6:30 PM IST)
  const now = new Date();
  const launchDate = new Date();
  launchDate.setHours(18, 30, 0, 0); // 6:30 PM today

  // If it's already past 6:30 PM, move to next day
  if (launchDate.getTime() < now.getTime()) {
    launchDate.setDate(launchDate.getDate() + 1);
  }

  const timer = setInterval(function () {
    const current = new Date().getTime();
    const distance = launchDate - current;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("days").innerText = days;
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;
    document.getElementById("seconds").innerText = seconds;

    if (distance < 0) {
      clearInterval(timer);
      document.querySelector(".countdown").innerHTML = "<h2>We’re Live Now!</h2>";
    }
  }, 1000);

  // Footer year
  document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
